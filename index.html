<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>327 Media</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#050b14;color:white}
.glass{
background:rgba(15,23,42,.7);
border:1px solid rgba(255,255,255,.1);
border-radius:16px;
padding:20px;
transition:.3s;
}
.glass:hover{transform:translateY(-5px)}
</style>
</head>

<body>

<header class="p-4 flex justify-between border-b border-white/10">
<h1 class="text-2xl font-black">327 Media</h1>

<div id="authUI">
<button onclick="openLogin()" class="border px-4 py-2 rounded">Login</button>
<button onclick="openSignup()" class="bg-yellow-500 px-4 py-2 rounded">Sign Up</button>
</div>

</header>

<!-- USER PANEL -->
<div id="userPanel" class="hidden p-4 border-b border-white/10">
Logged in as <span id="userEmail"></span>
<button onclick="logout()" class="ml-4 text-red-400">Logout</button>
</div>

<!-- HERO -->
<section class="p-6 text-center">
<h2 class="text-4xl font-black">Real Media Platform</h2>
</section>

<!-- SUBSCRIBE (NOTIFICATIONS SYSTEM) -->
<section class="p-6">
<div class="glass max-w-xl mx-auto text-center">
<h2 class="text-2xl font-bold">Get Daily Updates</h2>

<input id="subEmail" placeholder="Enter email"
class="mt-4 p-3 w-full bg-black border rounded">

<button onclick="subscribe()" class="mt-3 bg-blue-600 px-6 py-2 rounded">
Subscribe
</button>

<p id="subMsg" class="mt-2 text-sm text-gray-400"></p>
</div>
</section>

<!-- YOUR ARTICLES -->
<section class="p-6">
<h2 class="text-3xl font-bold">327 Media Featured</h2>

<div class="grid md:grid-cols-3 gap-4 mt-4">

<a href="https://x.com/327Media1/status/2043666568538959999" target="_blank" class="glass">
<img src="article-1.jpg" class="w-full h-40 object-cover">
<h3 class="mt-2 font-bold">Market Shock</h3>
</a>

<a href="https://x.com/327Media1/status/2044658040113385882" target="_blank" class="glass">
<img src="article-2.jpg" class="w-full h-40 object-cover">
<h3 class="mt-2 font-bold">Political Shift</h3>
</a>

<a href="https://x.com/327Media1/status/2044658242656346602" target="_blank" class="glass">
<img src="article-3.jpg" class="w-full h-40 object-cover">
<h3 class="mt-2 font-bold">Media Trends</h3>
</a>

</div>
</section>

<!-- NEWS -->
<section class="p-6">
<h2 class="text-3xl font-bold">Top Headlines</h2>
<div id="newsGrid" class="grid md:grid-cols-3 gap-4 mt-4"></div>
</section>

<footer class="p-6 text-center text-gray-400 border-t border-white/10">
© 2026 327 Media
</footer>

<!-- SUPABASE -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
'https://bwftfznxojkkcbptydai.supabase.co',
'sb_publishable_gwWxv-5WerfeI_4GR1moQw_OM3Xchm9'
)

// AUTH UI
window.openLogin = async ()=>{
let email=prompt("Email")
let pass=prompt("Password")

const {error}=await supabase.auth.signInWithPassword({email,password:pass})
if(error) alert(error.message)
checkUser()
}

window.openSignup = async ()=>{
let email=prompt("Email")
let pass=prompt("Password")

const {error}=await supabase.auth.signUp({email,password:pass})
if(error) alert(error.message)
alert("Account created")
}

window.logout = async ()=>{
await supabase.auth.signOut()
checkUser()
}

async function checkUser(){
const {data}=await supabase.auth.getUser()

if(data.user){
document.getElementById("authUI").style.display="none"
document.getElementById("userPanel").style.display="block"
document.getElementById("userEmail").innerText=data.user.email
}else{
document.getElementById("authUI").style.display="block"
document.getElementById("userPanel").style.display="none"
}
}

checkUser()

// SUBSCRIBE SYSTEM
window.subscribe = async ()=>{
let email=document.getElementById("subEmail").value

const {error}=await supabase.from("subscribers").insert({email})

if(error){
document.getElementById("subMsg").innerText="Already subscribed"
}else{
document.getElementById("subMsg").innerText="Subscribed!"
}
}

// NEWS
const feeds=[
"https://www.reuters.com/rss",
"https://apnews.com/rss",
"http://rss.cnn.com/rss/cnn_latest.rss"
]

async function loadNews(){
let all=[]

for(let f of feeds){
try{
let res=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(f))
let txt=await res.text()
let xml=new DOMParser().parseFromString(txt,"text/xml")
xml.querySelectorAll("item").forEach(i=>{
all.push({
title:i.querySelector("title").textContent,
link:i.querySelector("link").textContent
})
})
}catch{}
}

// mix sources
let grouped={}
all.forEach(n=>{
let s=n.link.split("/")[2]
if(!grouped[s]) grouped[s]=[]
grouped[s].push(n)
})

let mixed=[]
while(mixed.length<6){
for(let k in grouped){
if(grouped[k].length){
mixed.push(grouped[k].shift())
}
}
}

document.getElementById("newsGrid").innerHTML=
mixed.map(n=>`
<a href="${n.link}" target="_blank" class="glass">
<h3>${n.title}</h3>
</a>
`).join("")
}

loadNews()
</script>

</body>
</html>
